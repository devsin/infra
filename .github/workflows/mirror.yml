# ==============================================================================
# Mirror to Public Repository
#
# Pushes a copy of this repo to a public mirror.
# Workflows are included but gated with `if: github.repository == '...'`
# so they are visible but never trigger on the mirror.
#
# Required setup:
#   Secrets:
#     MIRROR_PAT   → fine-grained PAT with Contents R/W on the public mirror repo
#   Variables:
#     MIRROR_REPO  → "owner/repo" of the public mirror (e.g. "devsin/infra")
# ==============================================================================

name: "Mirror (public)"

on:
  push:
    branches: [main]

jobs:
  mirror:
    name: "Push to public mirror"
    runs-on: ubuntu-latest
    # Skip if no mirror target is configured
    if: vars.MIRROR_REPO != ''

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push to public mirror
        env:
          MIRROR_PAT: ${{ secrets.MIRROR_PAT }}
          MIRROR_REPO: ${{ vars.MIRROR_REPO }}
        run: |
          git remote add public "https://x-access-token:${MIRROR_PAT}@github.com/${MIRROR_REPO}.git"
          git push public main --force
